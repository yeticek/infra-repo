---
- name: Deploy static HTML behind nginx on port 8080
  hosts: nginx
  become: true
  gather_facts: true

  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Create nginx content directory
      ansible.builtin.file:
        path: /apps/nginx/html
        state: directory
        mode: "0755"

    - name: Copy static index page
      ansible.builtin.copy:
        src: config/html/index.html
        dest: /apps/nginx/html/index.html
        mode: "0644"

    - name: Install nginx site config for port 8080
      ansible.builtin.copy:
        src: config/nginx.config
        dest: /etc/nginx/sites-available/apps-nginx.conf
        mode: "0644"

    - name: Enable nginx site config
      ansible.builtin.file:
        src: /etc/nginx/sites-available/apps-nginx.conf
        dest: /etc/nginx/sites-enabled/apps-nginx.conf
        state: link

    - name: Validate nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Ensure nginx is enabled and running
      ansible.builtin.systemd:
        name: nginx
        state: restarted
        enabled: true
