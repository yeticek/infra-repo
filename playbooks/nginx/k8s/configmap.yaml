apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-static-site
  namespace: web
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Nginx</title>
    </head>
    <body>
      <h1>Nginx is running on port 8080</h1>
      <p>This page is served from the Kubernetes cluster.</p>
    </body>
    </html>
  default.conf: |
    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }

